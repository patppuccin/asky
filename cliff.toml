# Changelog generator configuration for asky
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
> To install or upgrade to this version, run `go get -u github.com/patppuccin/asky@{{ version }}`.
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
{% endfor %}
{% endfor %}
Full documentation on the [readme page](https://github.com/patppuccin/asky#readme).
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat!|^fix!|^refactor!|^perf!", group = "Breaking Changes" },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Changes & Fixes" },
    { message = "^refactor", group = "Changes & Fixes" },
    { message = "^perf", group = "Changes & Fixes" },
    { message = "^docs", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
